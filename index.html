<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVS Solves — Down for maintenance</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="description" content="MVS Solves is down for scheduled maintenance. Back shortly.">
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#ffffff;--ink:#0a0a0a;--soft:#4c4944;--muted:#8a8680;--line:rgba(10,10,10,.10);--accent:#00eeff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  @font-face{font-family:'Nohemi';src:url('https://cdn.jsdelivr.net/npm/@tamagui/font-nohemi@2.4.1/fonts/Nohemi-Bold.ttf') format('truetype');font-weight:700;font-display:swap;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:'Roboto',-apple-system,"Helvetica Neue",sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    -webkit-font-smoothing:antialiased;}
  .mark{display:inline-flex;align-items:center;gap:12px;margin-bottom:28px;}
  .mark .m{width:38px;height:38px;border-radius:10px;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;
    font-family:'Roboto',monospace;}
  .mark span{font-family:'Nohemi',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.02em;}
  h1{font-family:'Nohemi',sans-serif;font-weight:700;letter-spacing:-.02em;line-height:1.1;
    font-size:clamp(28px,5vw,42px);max-width:600px;}
  .accent{color:var(--accent);}
  p{margin-top:16px;color:var(--soft);font-size:15px;line-height:1.6;max-width:420px;margin-left:auto;margin-right:auto;}
  a{color:var(--ink);font-weight:600;text-decoration:underline;text-underline-offset:3px;}
</style>
</head>
<body>
<div>
  <div class="mark"><span class="m">M</span><span>MVS Solves</span></div>
  <h1>Down for a quick <span class="accent">tune-up.</span><br>Back shortly.</h1>
  <p>Need something urgently? Email <a href="mailto:martin@mvssolves.com">martin@mvssolves.com</a>.</p>
</div>
</body>
</html>
